name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/kotoba-lang/langgraph.git ../langgraph
      - run: git clone --depth 1 https://github.com/kotoba-lang/kagitaba.git ../kagitaba
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # kagi.crypto's hybrid ML-KEM-768/ML-DSA-65 support needs the
          # JDK 24 standard KeyPairGenerator/KEM/Signature providers
          # (JEP 496/497, FIPS 203/204) -- JDK 21 throws
          # NoSuchAlgorithmException for both.
          java-version: '24'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Compile typed phase gate
        run: |
          mkdir -p target/kotoba
          clojure -M:kotoba compile test/kagi/phase_conformance.kotoba \
            --source-path src --target js-browser --output target/kotoba/phase.mjs
          clojure -M:kotoba compile test/kagi/phase_conformance.kotoba \
            --source-path src --target wasm32-browser --output target/kotoba/phase.wasm
      - name: Execute Web and typed Wasm phase matrix
        run: |
          compiler_src="$(clojure -Spath -M:kotoba | tr ':' '\n' | grep '/compiler/' | head -1)"
          node scripts/verify-kotoba-phase.mjs target/kotoba/phase.mjs \
            target/kotoba/phase.wasm "$(dirname "$compiler_src")/runtime/browser-host.mjs"
      - name: Verify shared security adoption
        run: clojure -M -m kotoba.security.adoption
      - name: Run full repository tests
        run: clojure -M:test
      - name: Test WebAuthn PRF browser adapter
        run: node --test web/*.test.mjs
      - name: Lint source and tests
        run: clojure -M:lint
